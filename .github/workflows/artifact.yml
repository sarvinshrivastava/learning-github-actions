name: Artifact Workflow

on: [push]

env:
  ARTIFACT_NAME: testartifact

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout action
        use: actions/checkout@v2
      - name: Upload action
        use: actions/upload-artifact@v2
        with:
          name: ${{env.ARTIFACT_NAME}}
          path: .
  
